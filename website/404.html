<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Secret Sanitizer</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="icon-128.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #060a14;
      color: #e8edf5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .wrap { max-width: 480px; }
    h1 { font-size: 4rem; font-weight: 800; background: linear-gradient(135deg, #38bdf8, #06b6d4, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 12px; }
    p { color: #94a3b8; font-size: 1.05rem; margin-bottom: 28px; line-height: 1.6; }
    a {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 24px; border-radius: 10px; font-weight: 600; font-size: 0.95rem;
      background: linear-gradient(135deg, #0ea5e9, #06b6d4); color: #fff; text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    a:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(14, 165, 233, 0.25); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>404</h1>
